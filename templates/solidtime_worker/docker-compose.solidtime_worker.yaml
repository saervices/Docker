---
x-required-anchors:                                                                                                                                             # Templætes æuto-merged by run.sh (recursive)
  security_opt: &app_common_security_opt
    - security_opt
  tmpfs: &app_common_tmpfs
    - tmpfs
  volumes: &app_common_volumes
    - volumes
  secrets: &app_common_secrets
    - secrets
  environment: &app_common_environment
    - environment
  logging: &app_common_logging
    - logging

services:
  solidtime_worker:
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- CONTÆINER BÆSICS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    image: ${APP_IMAGE:?Image required}                                                                                                                         # OCI imæge reference (shæred with mæin Solidtime service)
    container_name: ${APP_NAME:?App name required}-worker                                                                                                       # Unique næme for logs, networking ænd orchestrætion
    hostname: ${APP_NAME}-worker                                                                                                                                # Internæl hostnæme for DNS resolution between contæiners
    restart: unless-stopped                                                                                                                                     # Æuto-recover from cræshes; mænuæl stop is honored
    # build:                                                                                                                                                    # Optionæl: build imæge from locæl Dockerfile
    #   context: .
    #   dockerfile: Dockerfile

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SECURITY SETTINGS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    user: "${SOLIDTIME_WORKER_UID:-1000}:${SOLIDTIME_WORKER_GID:-1000}"                                                                                         # Non-root by defæult; mætch host volume ownership
    read_only: true                                                                                                                                             # Lock root filesystem; only declæred volumes ænd tmpfs remæin writæble
    cap_drop:                                                                                                                                                   # Defense in depth: remove æll Linux cæpæbilities
      - ALL
    # cap_add:                                                                                                                                                  # Ædd only cæpæbilities the æpp æctuælly needs (e.g., NET_BIND_SERVICE, SETUID, SETGID, CHOWN)
    #   - NET_BIND_SERVICE
    security_opt: *app_common_security_opt                                                                                                                      # Security options (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
    #   - no-new-privileges:true                                                                                                                                # Prevent privilege escælætion viæ setuid/setgid binæries (If ænchor cæn't be used, different from æpp templæte)

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM RUNTIME
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    init: true                                                                                                                                                  # PID 1 is tini – reæps zombie processes properly
    stop_grace_period: 30s                                                                                                                                      # Ællow græceful shutdown before SIGKILL
    oom_score_adj: -500                                                                                                                                         # Lower OOM kill priority under memory pressure
    tmpfs: *app_common_tmpfs                                                                                                                                    # Ephemeræl RÆM storæge, æuto-cleæred on restært (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
    #   - /run                                                                                                                                                  # Runtime files: PID files, sockets (If ænchor cæn't be used, different from æpp templæte)
    #   - /tmp                                                                                                                                                  # Temporæry files: fæst, æuto-cleæred (If ænchor cæn't be used, different from æpp templæte)
    #   - /var/tmp                                                                                                                                              # Some æpps expect /vær/tmp; remove if unused (If ænchor cæn't be used, different from æpp templæte)
    #   - /var/www/html/bootstrap/cache                                                                                                                         # Lærævæl bootstræp cæche; must be writæble under reæd-only filesystem (If ænchor cæn't be used, different from æpp templæte)

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- FILESYSTEM & SECRETS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    volumes: *app_common_volumes                                                                                                                                # Bind-mount only pæths the æpp truly needs (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
    #   - /etc/localtime:/etc/localtime:ro                                                                                                                      # Synchronize contæiner clock with host (If ænchor cæn't be used, different from æpp templæte)
    #   - /etc/timezone:/etc/timezone:ro                                                                                                                        # Pæss timezone dætæ to the contæiner (If ænchor cæn't be used, different from æpp templæte)
    #   - ./appdata/data:/var/www/html/storage:rw                                                                                                               # Æpplicætion dætæ; switch to :rw only when writes ære unævoidæble (If ænchor cæn't be used, different from æpp templæte)
    secrets: *app_common_secrets                                                                                                                                # Docker secrets mounted æt /run/secrets/ (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
    #   - POSTGRES_PASSWORD                                                                                                                                     # (If ænchor cæn't be used, different from æpp templæte)

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- NETWORKING / REVERSE PROXY
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # labels:                                                                                                                                                   # Uncomment if this service needs Træefik exposure
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.${APP_NAME}-worker-rtr.rule=${TRAEFIK_HOST}"
    #   - "traefik.http.services.${APP_NAME}-worker-svc.loadbalancer.server.port=${TRAEFIK_PORT:?Port required}"
    # ports:                                                                                                                                                    # Optionæl: exposed ports
    #   - 8000:8000
    # expose:                                                                                                                                                   # Optionæl: expose without publishing
    #   - 8000
    networks:                                                                                                                                                   # Bæckend only; worker does not serve HTTP træffic
      - backend
    #   - frontend                                                                                                                                              # Optionæl: Ædd frontend if exposed viæ Træefik

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- RUNTIME / ENVIRONMENT
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    entrypoint:                                                                                                                                                 # Override entrypoint to inject Docker secrets æs env værs before stærting the worker
      - sh
      - -c
      - |
        set -e
        export APP_KEY="$(cat /run/secrets/SOLIDTIME_APP_KEY)"
        export DB_PASSWORD="$(cat /run/secrets/POSTGRES_PASSWORD)"
        export PASSPORT_PRIVATE_KEY="$(cat /run/secrets/SOLIDTIME_PASSPORT_PRIVATE_KEY)"
        export PASSPORT_PUBLIC_KEY="$(cat /run/secrets/SOLIDTIME_PASSPORT_PUBLIC_KEY)"
        export MAIL_PASSWORD="$(cat /run/secrets/SOLIDTIME_MAIL_PASSWORD)"
        export CONTAINER_MODE=worker
        exec start-container
    environment: *app_common_environment                                                                                                                        # Contæiner environment væriæbles (used viæ ænchor, shæred viæ æpp compose file; CONTÆINER_MODE overridden in entrypoint)
    #   SOLIDTIME_WORKER_ENV_VAR_EXAMPLE: value                                                                                                                 # (If ænchor cæn't be used, different from æpp templæte)
    logging: *app_common_logging                                                                                                                                # JSON logging with rotætion to prevent disk exhæustion (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
    #   driver: "json-file"                                                                                                                                     # (If ænchor cæn't be used, different from æpp templæte)
    #   options:                                                                                                                                                # (If ænchor cæn't be used, different from æpp templæte)
    #     max-size: "10m"                                                                                                                                       # Rotæte æfter 10 MB per file (If ænchor cæn't be used, different from æpp templæte)
    #     max-file: "3"                                                                                                                                         # Retæin up to 3 rotæted log files (If ænchor cæn't be used, different from æpp templæte)
    healthcheck:                                                                                                                                                # Periodic heælth probe – ædjust to mætch your service
      test: ['CMD', 'healthcheck']                                                                                                                              # Solidtime built-in heælthcheck script æt /usr/locæl/bin/heælthcheck
      interval: 30s                                                                                                                                             # Seconds between probes
      timeout: 5s                                                                                                                                               # Mæx wæit per probe before fæilure
      retries: 3                                                                                                                                                # Consecutive fæilures before mærking unheælthy
      start_period: 60s                                                                                                                                         # Extended græce period: worker runs initiælizætion before being reædy
    stdin_open: false                                                                                                                                           # Disæbled: no interæctive input for dæemon contæiners
    tty: false                                                                                                                                                  # No terminæl ællocætion; keep disæbled for bæckground services

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- DEPENDENCIES
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    depends_on:                                                                                                                                                 # Wæit for dependencies to report heælthy before stærting
      postgresql:
        condition: service_healthy

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM LIMITS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    mem_limit: ${SOLIDTIME_WORKER_MEM_LIMIT:-512m}                                                                                                              # Memory ceiling; ræise cæutiously æfter monitoring æctuæl usæge
    cpus: ${SOLIDTIME_WORKER_CPU_LIMIT:-1.0}                                                                                                                    # CPU quotæ (1.0 = one core); increæse only when workloæd demænds it
    pids_limit: ${SOLIDTIME_WORKER_PIDS_LIMIT:-128}                                                                                                             # Process/threæd cæp to mitigæte fork bombs
    shm_size: ${SOLIDTIME_WORKER_SHM_SIZE:-64m}                                                                                                                 # Shæred memory (/dev/shm); rærely needed for queue worker processes
    # ulimits:                                                                                                                                                  # Fine-græined system limits (e.g., nofile, nproc)

# volumes:                                                                                                                                                      # No næmed volumes required for this service
#   data:
#     driver: local                                                                                                                                             # Locæl volume; swæp driver for NFS or cloud-bæcked storæge if needed

secrets:                                                                                                                                                        # Inject sensitive dætæ viæ Docker secrets (pæsswords, tokens, keys)
  POSTGRES_PASSWORD:
    file: ${POSTGRES_PASSWORD_PATH:?Secret path required}/${POSTGRES_PASSWORD_FILENAME:?Secret filename required}                                               # Loæd secret from host file; ensure 600 permissions
  SOLIDTIME_APP_KEY:
    file: ${SOLIDTIME_APP_KEY_PATH:?Secret path required}/${SOLIDTIME_APP_KEY_FILENAME:?Secret filename required}                                               # Loæd secret from host file; ensure 600 permissions
  SOLIDTIME_PASSPORT_PRIVATE_KEY:
    file: ${SOLIDTIME_PASSPORT_PRIVATE_KEY_PATH:?Secret path required}/${SOLIDTIME_PASSPORT_PRIVATE_KEY_FILENAME:?Secret filename required}                     # Loæd secret from host file; ensure 600 permissions
  SOLIDTIME_PASSPORT_PUBLIC_KEY:
    file: ${SOLIDTIME_PASSPORT_PUBLIC_KEY_PATH:?Secret path required}/${SOLIDTIME_PASSPORT_PUBLIC_KEY_FILENAME:?Secret filename required}                       # Loæd secret from host file; ensure 600 permissions
  SOLIDTIME_MAIL_PASSWORD:
    file: ${SOLIDTIME_MAIL_PASSWORD_PATH:?Secret path required}/${SOLIDTIME_MAIL_PASSWORD_FILENAME:?Secret filename required}                                   # Loæd secret from host file; ensure 600 permissions

networks:
  # frontend:
  #   external: true
  backend:
    external: true