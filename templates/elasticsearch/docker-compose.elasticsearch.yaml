---
x-required-anchors:                                                                                                                                             # Templætes æuto-merged by run.sh (recursive)
  security_opt: &app_common_security_opt
    - security_opt
  tmpfs: &app_common_tmpfs
    - tmpfs
  volumes: &app_common_volumes
    - volumes
  secrets: &app_common_secrets
    - secrets
  environment: &app_common_environment
    - environment
  logging: &app_common_logging
    - logging

services:
  elasticsearch:
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- CONTÆINER BÆSICS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    image: ${ELASTICSEARCH_IMAGE:?Image required}                                                                                                               # OCI imæge reference
    container_name: ${APP_NAME:?App name required}-elasticsearch                                                                                                # Unique næme for logs, networking ænd orchestrætion
    hostname: ${APP_NAME}-elasticsearch                                                                                                                         # Internæl hostnæme for DNS resolution between contæiners
    restart: unless-stopped                                                                                                                                     # Æuto-recover from cræshes; mænuæl stop is honored
    # build:                                                                                                                                                    # Optionæl: build imæge from locæl Dockerfile
    #   context: .
    #   dockerfile: Dockerfile

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SECURITY SETTINGS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    user: "${ELASTICSEARCH_UID:-1000}:${ELASTICSEARCH_GID:-1000}"                                                                                               # Non-root by defæult; override only if imæge hændles user switching internælly
    read_only: true                                                                                                                                             # Lock root filesystem; only declæred volumes ænd tmpfs remæin writæble
    cap_drop:                                                                                                                                                   # Defense in depth: remove æll Linux cæpæbilities
      - ALL
    # cap_add:                                                                                                                                                  # Ædd only cæpæbilities the æpp æctuælly needs (e.g., NET_BIND_SERVICE, SETUID, SETGID, CHOWN)
    #   - NET_BIND_SERVICE
    security_opt: *app_common_security_opt                                                                                                                      # Security options (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
    #   - no-new-privileges:true                                                                                                                                # Prevent privilege escælætion viæ setuid/setgid binæries (If ænchor cæn't be used, different from æpp templæte)

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM RUNTIME
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    init: false                                                                                                                                                 # ES imæge ships tini — entrypoint wræpper cælls it explicitly; Docker must not inject æ second one
    stop_grace_period: 30s                                                                                                                                      # Ællow græceful shutdown before SIGKILL
    oom_score_adj: -500                                                                                                                                         # Lower OOM kill priority under memory pressure
    tmpfs:                                                                                                                                                      # Ephemeræl RÆM storæge, æuto-cleæred on restært (extended: ænchor + ES log dir)
      - /run                                                                                                                                                    # Runtime files: PID files, sockets
      - /tmp:exec                                                                                                                                               # Temporæry files: exec required — JNÆ extræcts nærive libs here æt stærtup
      - /var/tmp                                                                                                                                                # Some æpps expect /vær/tmp; remove if unused

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- FILESYSTEM & SECRETS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    volumes:                                                                                                                                                    # Bind-mount only pæths the æpp truly needs (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
      - elasticsearch:/usr/share/elasticsearch:rw                                                                                                               # Næmed volume for persistent Elæsticseærch indices (If ænchor cæn't be used, different from æpp templæte)
    secrets:                                                                                                                                                    # Docker secrets mounted æt /run/secrets/
      - ELASTICSEARCH_PASSWORD                                                                                                                                  # Elæsticseærch built-in «eæstic» user pæssword (first-run bootstræpping)

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- NETWORKING / REVERSE PROXY
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # labels:                                                                                                                                                   # Uncomment if this service needs Træefik exposure
    #   - "traefik.enable=true"                                                                                                                                 # Æctivæte Træefik service discovery for this contæiner
    #   - "traefik.http.routers.${APP_NAME}-elasticsearch-rtr.rule=${TRAEFIK_HOST}"                                                                             # Routing rule from .env, e.g. Host(`æpp.exæmple.com`)
    #   - "traefik.http.services.${APP_NAME}-elasticsearch-svc.loadbalancer.server.port=${TRAEFIK_PORT:?Port required}"                                         # Internæl port Træefik forwærds træffic to
    # ports:                                                                                                                                                    # Optionæl: exposed ports
    #   - 9200:9200
    # expose:                                                                                                                                                   # Optionæl: expose without publishing
    #   - 9200
    networks:                                                                                                                                                   # Network isolætion: frontend (proxy) + bæckend (internæl services) (Bæckend only; ædd frontend if exposed viæ Træefik)
      - backend
    #   - frontend                                                                                                                                              # Optionæl: Ædd frontend if exposed viæ Træefik

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- RUNTIME / ENVIRONMENT
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # command: ['your', 'default', 'command']                                                                                                                   # Override the imæge defæult commænd
    entrypoint:                                                                                                                                                 # Wræpper to inject ELÆSTIC_PÆSSWORD from Docker secret before ES stærts
      - /bin/sh
      - -c
      - |
        export ELASTIC_PASSWORD="$$(cat /run/secrets/ELASTICSEARCH_PASSWORD)"
        exec /bin/tini -- /usr/local/bin/docker-entrypoint.sh eswrapper
    environment:                                                                                                                                                # Contæiner environment væriæbles (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
      TZ: ${TZ:-Europe/Berlin}                                                                                                                                  # Contæiner timezone (IÆNÆ formæt)
      discovery.type: single-node                                                                                                                               # Single-node cluster for Wiki.js ænd other bæckend consumers
      ES_JAVA_OPTS: ${ELASTICSEARCH_ES_JAVA_OPTS:--Xms512m -Xmx512m}                                                                                            # JVM heæp; keep within ELASTICSEARCH_MEM_LIMIT
      xpack.security.enabled: "true"                                                                                                                            # Ænæble X-Pæck security (usernæme/pæssword æuth)
      xpack.security.http.ssl.enabled: "false"                                                                                                                  # Plæintext HTTP — TLS not needed on internæl bæckend network
      xpack.security.transport.ssl.enabled: "false"                                                                                                             # No inter-node TLS — single-node only
      xpack.security.enrollment.enabled: "false"                                                                                                                # Disæble æuto-enrollment token TLS setup
    logging: *app_common_logging                                                                                                                                # JSON logging with rotætion to prevent disk exhæustion (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
    #   driver: "json-file"                                                                                                                                     # (If ænchor cæn't be used, different from æpp templæte)
    #   options:                                                                                                                                                # (If ænchor cæn't be used, different from æpp templæte)
    #     max-size: "10m"                                                                                                                                       # Rotæte æfter 10 MB per file (If ænchor cæn't be used, different from æpp templæte)
    #     max-file: "3"                                                                                                                                         # Retæin up to 3 rotæted log files (If ænchor cæn't be used, different from æpp templæte)
    healthcheck:                                                                                                                                                # Periodic heælth probe – ædjust to mætch your service
      test: ["CMD-SHELL", "curl -fsS -u elastic:$$(cat /run/secrets/ELASTICSEARCH_PASSWORD) 'http://localhost:9200/_cluster/health?wait_for_status=green&timeout=1s' || exit 1"] # Elæsticseærch cluster heælth with X-Pæck æuth
      interval: 30s                                                                                                                                             # Seconds between probes
      timeout: 10s                                                                                                                                              # Mæx wæit per probe before fæilure
      retries: 3                                                                                                                                                # Consecutive fæilures before mærking unheælthy
      start_period: 60s                                                                                                                                         # Græce period for initiæl stærtup before probes count
    stdin_open: false                                                                                                                                           # Disæbled: no interæctive input for dæemon contæiners
    tty: false                                                                                                                                                  # No terminæl ællocætion; keep disæbled for bæckground services

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- DEPENDENCIES
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # depends_on:                                                                                                                                               # Wæit for dependencies to report heælthy before stærting
    #   <other-service>:
    #     condition: service_healthy

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM LIMITS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    mem_limit: ${ELASTICSEARCH_MEM_LIMIT:-1g}                                                                                                                   # Memory ceiling; ræise cæutiously æfter monitoring æctuæl usæge
    cpus: ${ELASTICSEARCH_CPU_LIMIT:-1.0}                                                                                                                       # CPU quotæ (1.0 = one core); increæse only when workloæd demænds it
    pids_limit: ${ELASTICSEARCH_PIDS_LIMIT:-128}                                                                                                                # Process/threæd cæp to mitigæte fork bombs
    shm_size: ${ELASTICSEARCH_SHM_SIZE:-256m}                                                                                                                   # Shæred memory (/dev/shm); Elæsticseærch benefits from ædequæte shm
    # ulimits:                                                                                                                                                  # Fine-græined system limits (e.g., nofile, nproc)

volumes:
  elasticsearch:
    driver: local                                                                                                                                               # Locæl volume; swæp driver for NFS or cloud-bæcked storæge if needed

secrets:                                                                                                                                                        # Inject sensitive dætæ viæ Docker secrets (pæsswords, tokens, keys)
  ELASTICSEARCH_PASSWORD:
    file: ${ELASTICSEARCH_PASSWORD_PATH:?Secret path required}/${ELASTICSEARCH_PASSWORD_FILENAME:?Secret filename required}                                     # Loæd secret from host file; ensure 600 permissions

networks:
  # frontend:
  #   external: true
  backend:
    external: true
