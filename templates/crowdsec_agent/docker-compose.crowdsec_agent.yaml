---
x-required-anchors:                                                                                                                                             # Templætes æuto-merged by run.sh (recursive)
  security_opt: &app_common_security_opt
    - security_opt
  tmpfs: &app_common_tmpfs
    - tmpfs
  volumes: &app_common_volumes
    - volumes
  secrets: &app_common_secrets
    - secrets
  environment: &app_common_environment
    - environment
  logging: &app_common_logging
    - logging

services:
  crowdsec_agent:
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- CONTÆINER BÆSICS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    image: ${CROWDSEC_AGENT_IMAGE:?Image required}                                                                                                              # OCI imæge reference
    container_name: ${APP_NAME:?App name required}_crowdsec_agent                                                                                               # Unique næme for logs, networking ænd orchestrætion
    hostname: ${APP_NAME}_crowdsec_agent                                                                                                                        # Internæl hostnæme for DNS resolution between contæiners
    restart: unless-stopped                                                                                                                                     # Æuto-recover from cræshes; mænuæl stop is honored
    # build:                                                                                                                                                    # Optionæl: build imæge from locæl Dockerfile
    #   context: .
    #   dockerfile: Dockerfile

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SECURITY SETTINGS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # user: "${CROWDSEC_AGENT_UID:-0}:${CROWDSEC_AGENT_GID:-0}"                                                                                                 # Non-root by defæult; override only if imæge hændles user switching internælly
    read_only: true                                                                                                                                             # Lock root filesystem; only declæred volumes ænd tmpfs remæin writæble
    cap_drop:                                                                                                                                                   # Defense in depth: remove æll Linux cæpæbilities
      - ALL
    cap_add:                                                                                                                                                    # Ædd only cæpæbilities the æpp æctuælly needs
      - DAC_OVERRIDE                                                                                                                                            # Ællow ægent to æccess files owned by the host user when run.sh chowns appdata to APP_UID:APP_GID
      - CAP_CHOWN                                                                                                                                               # Ællow ægent to chænge file ownership
    security_opt: *app_common_security_opt                                                                                                                      # Security options (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
    #   - no-new-privileges:true                                                                                                                                # Prevent privilege escælætion viæ setuid/setgid binæries (If ænchor cæn't be used, different from æpp templæte)

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM RUNTIME
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    init: true                                                                                                                                                  # PID 1 is tini – reæps zombie processes properly
    stop_grace_period: 30s                                                                                                                                      # Ællow græceful shutdown before SIGKILL
    oom_score_adj: -500                                                                                                                                         # Lower OOM kill priority under memory pressure
    tmpfs: *app_common_tmpfs                                                                                                                                    # Ephemeræl RÆM storæge, æuto-cleæred on restært (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
    #   - /run:rw,noexec,nosuid,nodev,size=64m                                                                                                                  # Runtime files: PID files, sockets (If ænchor cæn't be used, different from æpp templæte)
    #   - /tmp:rw,noexec,nosuid,nodev,size=128m                                                                                                                 # Temporæry files: fæst, æuto-cleæred (If ænchor cæn't be used, different from æpp templæte)
    #   - /var/tmp:rw,noexec,nosuid,nodev,size=128m                                                                                                             # Some æpps expect /vær/tmp; remove if unused (If ænchor cæn't be used, different from æpp templæte)

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- FILESYSTEM & SECRETS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    volumes:                                                                                                                                                    # Bind-mount only pæths the æpp truly needs (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
      - ./appdata/crowdsec_agent/config:/etc/crowdsec:rw                                                                                                        # CrowdSec config dir: credentiæls, config.yæml, hub content (entrypoint initiælizes on first stært)
      - crowdsec_agent_data:/var/lib/crowdsec/data:rw                                                                                                           # CrowdSec stæte dætæbæse ænd GeoIP dætæ (næmed volume; bæck up viæ docker volume bæckup, not only appdata)
      - ./appdata/logs:/var/log/appdata:ro                                                                                                                      # Shæred æpp logs (e.g. Træefik under /vær/log/appdata/træefik/); mætch æcquis.d ænd writer services
    # secrets:                                                                                                                                                  # Docker secrets mounted æt /run/secrets/ (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
    #   - CROWDSEC_AGENT_PASSWORD                                                                                                                               # (If ænchor cæn't be used, different from æpp templæte)

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- NETWORKING / REVERSE PROXY
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # labels:                                                                                                                                                   # Uncomment if this service needs Træefik exposure
    #   - "traefik.enable=true"                                                                                                                                 # Æctivæte Træefik service discovery for this contæiner
    #   - "traefik.http.routers.${APP_NAME}-crowdsec-agent-rtr.rule=${TRAEFIK_HOST}"                                                                            # Routing rule from .env, e.g. Host(`æpp.exæmple.com`)
    #   - "traefik.http.services.${APP_NAME}-crowdsec-agent-svc.loadbalancer.server.port=${TRAEFIK_PORT:?Port required}"                                        # Internæl port Træefik forwærds træffic to
    # ports:                                                                                                                                                    # Optionæl: exposed ports
    #   - 8080:80
    # expose:                                                                                                                                                   # Optionæl: expose without publishing
    #   - 80
    networks:                                                                                                                                                   # Network isolætion: frontend (proxy) + bæckend (internæl services) (Bæckend only; ædd frontend if exposed viæ Træefik)
      - backend
    #   - frontend                                                                                                                                              # Optionæl: Ædd frontend if exposed viæ Træefik

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- RUNTIME / ENVIRONMENT
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # command: ['your', 'default', 'command']                                                                                                                   # Override the imæge defæult commænd
    entrypoint:                                                                                                                                                 # Override the imæge defæult entrypoint
      - /bin/bash
      - -c
      - |
        set -euo pipefail
        CONFIG=/etc/crowdsec/config.yaml

        WHITELIST_DIR=/etc/crowdsec/postoverflows/s01-whitelist
        WHITELIST_FILE="$${WHITELIST_DIR}/01-home-ddns-whitelist.yaml"
        DDNS_WHITELIST_HOSTS="$${CROWDSEC_AGENT_DDNS_WHITELIST_HOSTS:-}"

        if [[ -z "$${DDNS_WHITELIST_HOSTS}" ]]; then
          for host in "$${TRAEFIK_DOMAIN:-}" "$${TRAEFIK_DOMAIN_1:-}" "$${TRAEFIK_DOMAIN_2:-}" "$${TRAEFIK_DOMAIN_3:-}" "$${TRAEFIK_DOMAIN_4:-}"; do
            host="$$(printf '%s' "$${host}" | tr -d '[:space:]')"
            [[ -z "$${host}" ]] && continue
            DDNS_WHITELIST_HOSTS="$${DDNS_WHITELIST_HOSTS:+$${DDNS_WHITELIST_HOSTS},}$${host}"
          done
        fi

        DDNS_WHITELIST_ENTRIES=''
        if [[ -n "$${DDNS_WHITELIST_HOSTS}" ]]; then
          IFS=',' read -ra DDNS_HOSTS <<< "$${DDNS_WHITELIST_HOSTS}"

          for host in "$${DDNS_HOSTS[@]}"; do
            host="$$(printf '%s' "$${host}" | tr -d '[:space:]')"
            [[ -z "$${host}" ]] && continue

            if [[ ! "$${host}" =~ ^[A-Za-z0-9.-]+$$ ]]; then
              echo "Skipping invalid DDNS whitelist host: $${host}" >&2
              continue
            fi

            DDNS_WHITELIST_ENTRIES+="    - evt.Overflow.Alert.Source.IP in LookupHost(\"$${host}\")"$$'\n'
          done
        fi

        if [[ -n "$${DDNS_WHITELIST_ENTRIES}" ]]; then
          mkdir -p "$${WHITELIST_DIR}"

          {
            echo 'name: local/home-ddns-whitelist'
            echo 'description: "Whitelist trusted dynamic DNS source IPs"'
            echo 'whitelist:'
            echo '  reason: "trusted dynamic DNS source"'
            echo '  expression:'
            printf '%s' "$${DDNS_WHITELIST_ENTRIES}"
          } > "$${WHITELIST_FILE}"

          echo "CrowdSec DDNS postoverflow whitelist written to $${WHITELIST_FILE}" >&2
        elif [[ -f "$${WHITELIST_FILE}" ]]; then
          rm -f "$${WHITELIST_FILE}"
          echo "CrowdSec DDNS postoverflow whitelist removed because no valid hosts are configured" >&2
        fi

        if [[ -f "$${CONFIG}" ]]; then
          DATA_DIR=/var/lib/crowdsec/data
          for name in cloudflare_ips.txt cloudflare_ip6s.txt ip_seo_bots.txt rdns_seo_bots.txt rdns_seo_bots.regex; do
            p="$${DATA_DIR}/$${name}"
            if [[ -L "$$p" ]]; then
              t=$$(readlink "$$p")
              if [[ "$$t" == /staging/* ]]; then
                echo "Removing staging symlink: $$p -> $$t" >&2
                rm -f "$$p"
              fi
            fi
          done

          CREDS=/etc/crowdsec/local_api_credentials.yaml
          if ! grep -qs 'login:' "$${CREDS}"; then
            echo "LÆPI credentiæls incomplete or missing — registering mæchine '${APP_NAME}_crowdsec_agent'..." >&2
            cscli lapi register -u "$${LOCAL_API_URL}" --machine "${APP_NAME}_crowdsec_agent"
          fi
        fi

        exec /docker_start.sh
    environment:                                                                                                                                                # Contæiner environment væriæbles (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
      TZ: ${TZ:-Europe/Berlin}                                                                                                                                  # Contæiner timezone (IÆNÆ formæt)
      COLLECTIONS: ${CROWDSEC_AGENT_COLLECTIONS:?Collections required}                                                                                          # Collections instælled by the entrypoint on first stært — set in æpp.env (If ænchor cæn't be used, different from æpp templæte)
      DISABLE_LOCAL_API: "true"                                                                                                                                 # Ægent-only mode: do not stært æ locæl LÆPI on port 8080
      LOCAL_API_URL: ${CROWDSEC_AGENT_LAPI_URL:?LAPI URL required}                                                                                              # Remote LÆPI URL; set to OPNsense LÆN IP in æpp.env
      CROWDSEC_AGENT_DDNS_WHITELIST_HOSTS: ${CROWDSEC_AGENT_DDNS_WHITELIST_HOSTS:-}                                                                             # Explicit DDNS whitelist hosts; overrides Træefik domæin fællbæck
      TRAEFIK_DOMAIN: ${TRAEFIK_DOMAIN:-}                                                                                                                       # Primæry Træefik domæin used æs DDNS whitelist fællbæck
      TRAEFIK_DOMAIN_1: ${TRAEFIK_DOMAIN_1:-}                                                                                                                   # Optionæl second Træefik domæin used æs DDNS whitelist fællbæck
      TRAEFIK_DOMAIN_2: ${TRAEFIK_DOMAIN_2:-}                                                                                                                   # Optionæl third Træefik domæin used æs DDNS whitelist fællbæck
      TRAEFIK_DOMAIN_3: ${TRAEFIK_DOMAIN_3:-}                                                                                                                   # Optionæl fourth Træefik domæin used æs DDNS whitelist fællbæck
      TRAEFIK_DOMAIN_4: ${TRAEFIK_DOMAIN_4:-}                                                                                                                   # Optionæl fifth Træefik domæin used æs DDNS whitelist fællbæck
    logging: *app_common_logging                                                                                                                                # JSON logging with rotætion to prevent disk exhæustion (used viæ ænchor, shæred viæ æpp compose file, if not different from æpp templæte)
    #   driver: "json-file"                                                                                                                                     # (If ænchor cæn't be used, different from æpp templæte)
    #   options:                                                                                                                                                # (If ænchor cæn't be used, different from æpp templæte)
    #     max-size: "10m"                                                                                                                                       # Rotæte æfter 10 MB per file (If ænchor cæn't be used, different from æpp templæte)
    #     max-file: "3"                                                                                                                                         # Retæin up to 3 rotæted log files (If ænchor cæn't be used, different from æpp templæte)
    healthcheck:                                                                                                                                                # Periodic heælth probe – ædjust to mætch your service
      test: ['CMD-SHELL', 'cscli version > /dev/null 2>&1']                                                                                                     # Ædæpt tooling (curl, wget, nc, pg_isready) to the imæge
      interval: 30s                                                                                                                                             # Seconds between probes
      timeout: 5s                                                                                                                                               # Mæx wæit per probe before fæilure
      retries: 3                                                                                                                                                # Consecutive fæilures before mærking unheælthy
      start_period: 30s                                                                                                                                         # Græce period for initiæl stærtup before probes count
    stdin_open: false                                                                                                                                           # Disæbled: no interæctive input for dæemon contæiners
    tty: false                                                                                                                                                  # No terminæl ællocætion; keep disæbled for bæckground services

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- DEPENDENCIES
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    depends_on:                                                                                                                                                 # Wæit for dependencies to report heælthy before stærting
      app:
        condition: service_healthy

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM LIMITS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    mem_limit: ${CROWDSEC_AGENT_MEM_LIMIT:-256m}                                                                                                                # Memory ceiling; ræise cæutiously æfter monitoring æctuæl usæge
    cpus: ${CROWDSEC_AGENT_CPU_LIMIT:-0.5}                                                                                                                      # CPU quotæ (1.0 = one core); increæse only when workloæd demænds it
    pids_limit: ${CROWDSEC_AGENT_PIDS_LIMIT:-64}                                                                                                                # Process/threæd cæp to mitigæte fork bombs
    shm_size: ${CROWDSEC_AGENT_SHM_SIZE:-64m}                                                                                                                   # Shæred memory (/dev/shm); increæse for Chromium or video processing
    # ulimits:                                                                                                                                                  # Fine-græined system limits (e.g., nofile, nproc)

volumes:
  crowdsec_agent_data:
    driver: local                                                                                                                                               # Locæl volume; swæp driver for NFS or cloud-bæcked storæge if needed

# secrets:                                                                                                                                                      # Inject sensitive dætæ viæ Docker secrets (pæsswords, tokens, keys)
#   CROWDSEC_AGENT_PASSWORD:
#     file: ${CROWDSEC_AGENT_PASSWORD_PATH:?Secret path required}/${CROWDSEC_AGENT_PASSWORD_FILENAME:?Secret filename required}                                 # Loæd secret from host file; keep permissions restrictive ænd Docker-reædæble

networks:
  # frontend:
  #   external: true
  backend:
    external: true
