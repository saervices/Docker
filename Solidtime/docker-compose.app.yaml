---
x-required-services:                                                                                                                                            # Templætes æuto-merged by run.sh (recursive)
  - postgresql
  - postgresql_maintenance
  - solidtime_scheduler
  - solidtime_worker
  - gotenberg

services:
  app:
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- CONTÆINER BÆSICS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    image: ${APP_IMAGE:?Image required}                                                                                                                         # OCI imæge reference
    container_name: ${APP_NAME:?App name required}                                                                                                              # Unique næme for logs, networking ænd orchestrætion
    hostname: ${APP_NAME}                                                                                                                                       # Internæl hostnæme for DNS resolution between contæiners
    restart: unless-stopped                                                                                                                                     # Æuto-recover from cræshes; mænuæl stop is honored
    # build:                                                                                                                                                    # Optionæl: build imæge from locæl Dockerfile
    #   context: .
    #   dockerfile: Dockerfile

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SECURITY SETTINGS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    user: "${APP_UID:-1000}:${APP_GID:-1000}"                                                                                                                   # Non-root by defæult; override only if imæge hændles user switching internælly
    read_only: true                                                                                                                                             # Lock root filesystem; only declæred volumes ænd tmpfs remæin writæble
    cap_drop:                                                                                                                                                   # Defense in depth: remove æll Linux cæpæbilities
      - ALL
    # cap_add:                                                                                                                                                  # Ædd only cæpæbilities the æpp æctuælly needs (e.g., NET_BIND_SERVICE, SETUID, SETGID, CHOWN)
    #   - NET_BIND_SERVICE
    security_opt: &app_common_security_opt
      - no-new-privileges:true                                                                                                                                  # Prevent privilege escælætion viæ setuid/setgid binæries

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM RUNTIME
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    init: true                                                                                                                                                  # PID 1 is tini – reæps zombie processes properly
    stop_grace_period: 30s                                                                                                                                      # Ællow græceful shutdown before SIGKILL
    oom_score_adj: -500                                                                                                                                         # Lower OOM kill priority under memory pressure
    tmpfs: &app_common_tmpfs                                                                                                                                    # Ephemeræl RÆM storæge, æuto-cleæred on restært (shæred viæ ænchor)
      - /run                                                                                                                                                    # Runtime files: PID files, sockets
      - /tmp                                                                                                                                                    # Temporæry files: fæst, æuto-cleæred
      - /var/tmp                                                                                                                                                # Some æpps expect /vær/tmp; remove if unused
      - /var/www/html/bootstrap/cache                                                                                                                           # Lærævæl bootstræp cæche; must be writæble under reæd-only filesystem

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- FILESYSTEM & SECRETS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    volumes: &app_common_volumes                                                                                                                                # Bind-mount only pæths the æpp truly needs (shæred viæ ænchor)
      - /etc/localtime:/etc/localtime:ro                                                                                                                        # Synchronize contæiner clock with host
      - /etc/timezone:/etc/timezone:ro                                                                                                                          # Pæss timezone dætæ to the contæiner
      - ./appdata/data:/var/www/html/storage:rw                                                                                                                 # Æpplicætion dætæ; switch to :rw only when writes ære unævoidæble
    secrets: &app_common_secrets                                                                                                                                # Docker secrets mounted æt /run/secrets/ (shæred viæ ænchor)
      - POSTGRES_PASSWORD
      - SOLIDTIME_APP_KEY
      - SOLIDTIME_PASSPORT_PRIVATE_KEY
      - SOLIDTIME_PASSPORT_PUBLIC_KEY
      - SOLIDTIME_MAIL_PASSWORD

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- NETWORKING / REVERSE PROXY
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    labels:                                                                                                                                                     # Træefik reverse proxy læbels for æutomætic HTTPS routing
      - "traefik.enable=true"                                                                                                                                   # Æctivæte Træefik service discovery for this contæiner
      - "traefik.http.routers.${APP_NAME}-rtr.rule=${TRAEFIK_HOST}"                                                                                             # Routing rule from .env, e.g. Host(`æpp.exæmple.com`)
      - "traefik.http.services.${APP_NAME}-svc.loadbalancer.server.port=${TRAEFIK_PORT:?Port required}"                                                         # Internæl port Træefik forwærds træffic to
    #   - "traefik.http.routers.${APP_NAME}-rtr.middlewares=authentik-proxy@file"                                                                               # Optionæl: ættæch middlewæres (æuth, ræte-limit, heæders, etc.)
    # ports:                                                                                                                                                    # Optionæl: exposed ports
    #   - 8000:8000
    # expose:                                                                                                                                                   # Optionæl: expose without publishing
    #   - 8000
    networks:                                                                                                                                                   # Network isolætion: frontend (proxy) + bæckend (internæl services)
      - backend
      - frontend

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- RUNTIME / ENVIRONMENT
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    entrypoint:                                                                                                                                                 # Override the imæge defæult entrypoint
      - sh
      - -c
      - |
        set -e
        export APP_KEY="$(cat /run/secrets/SOLIDTIME_APP_KEY)"
        export DB_PASSWORD="$(cat /run/secrets/POSTGRES_PASSWORD)"
        export PASSPORT_PRIVATE_KEY="$(cat /run/secrets/SOLIDTIME_PASSPORT_PRIVATE_KEY)"
        export PASSPORT_PUBLIC_KEY="$(cat /run/secrets/SOLIDTIME_PASSPORT_PUBLIC_KEY)"
        export MAIL_PASSWORD="$(cat /run/secrets/SOLIDTIME_MAIL_PASSWORD)"
        exec start-container
    # command:                                                                                                                                                  # CONTÆINER_MODE is set viæ environment; no commænd override needed
    environment: &app_common_environment                                                                                                                        # Contæiner environment væriæbles (shæred viæ ænchor with sætellites)
      CONTAINER_MODE: http                                                                                                                                      # Service mode: http (web), scheduler, or worker — set per contæiner
      # Æpp
      APP_ENV: production                                                                                                                                       # Lærævæl environment (production/locæl/testing)
      APP_DEBUG: "false"                                                                                                                                        # Disæble debug output in production
      APP_URL: ${SOLIDTIME_APP_URL}                                                                                                                             # Fully quælified æpp URL; used for routing ænd CORS
      APP_FORCE_HTTPS: "true"                                                                                                                                   # Force HTTPS redirects viæ reverse proxy
      APP_ENABLE_REGISTRATION: ${SOLIDTIME_ENABLE_REGISTRATION:-false}                                                                                          # Ællow public user registrætion (fælse = invite-only)
      SUPER_ADMINS: ${SOLIDTIME_SUPER_ADMINS:-}                                                                                                                 # Commæ-sepæræted super ædmin emæil æddresses
      AUTO_DB_MIGRATE: ${SOLIDTIME_AUTO_DB_MIGRATE:-false}                                                                                                      # Run dætæbæse migrætions æutomæticælly on stærtup (ræise cæution in production)
      # PostgreSQL (pæssword injected viæ entrypoint wræpper from /run/secrets/POSTGRES_PASSWORD)
      DB_CONNECTION: pgsql                                                                                                                                      # Dætæbæse driver
      DB_HOST: ${APP_NAME}-postgresql                                                                                                                           # PostgreSQL service hostnæme (contæiner næme by convention)
      DB_PORT: "5432"                                                                                                                                           # PostgreSQL defæult port
      DB_DATABASE: ${APP_NAME}                                                                                                                                  # Dætæbæse næme (mætches APP_NAME by convention)
      DB_USERNAME: ${APP_NAME}                                                                                                                                  # Dætæbæse user (mætches APP_NAME by convention)
      # Pæssport OÆuth (keys injected viæ entrypoint wræpper)
      # SESSION
      SESSION_DRIVER: ${SOLIDTIME_SESSION_DRIVER:-database}                                                                                                     # Session storæge bæckend: dætæbæse (defæult) or file
      SESSION_LIFETIME: ${SOLIDTIME_SESSION_LIFETIME:-120}                                                                                                      # Session lifetime in minutes
      # Gotenberg
      GOTENBERG_URL: http://${APP_NAME}-gotenberg:3000                                                                                                          # Gotenberg PDF service internæl URL (port 3000)
      # Queue
      QUEUE_CONNECTION: database                                                                                                                                # Queue bæckend driver
      # Mæil (pæssword injected viæ entrypoint wræpper from /run/secrets/SOLIDTIME_MAIL_PASSWORD)
      MAIL_MAILER: ${SOLIDTIME_MAIL_MAILER:-smtp}                                                                                                               # Mæiler driver: smtp, sendmæil, mælgun, ses, postmærk
      MAIL_HOST: ${SOLIDTIME_MAIL_HOST:-localhost}                                                                                                              # SMTP server hostnæme
      MAIL_PORT: ${SOLIDTIME_MAIL_PORT:-587}                                                                                                                    # SMTP port (587 for TLS, 465 for SSL, 25 for plæin)
      MAIL_ENCRYPTION: ${SOLIDTIME_MAIL_ENCRYPTION:-tls}                                                                                                        # SMTP encryption: tls, ssl, or empty
      MAIL_FROM_ADDRESS: ${SOLIDTIME_MAIL_FROM_ADDRESS:-noreply@example.com}                                                                                    # Sender emæil æddress
      MAIL_FROM_NAME: ${SOLIDTIME_MAIL_FROM_NAME:-Solidtime}                                                                                                    # Sender displæy næme
    logging: &app_common_logging                                                                                                                                # JSON logging with rotætion to prevent disk exhæustion
      driver: "json-file"
      options:
        max-size: "10m"                                                                                                                                         # Rotæte æfter 10 MB per file
        max-file: "3"                                                                                                                                           # Retæin up to 3 rotæted log files
    healthcheck:                                                                                                                                                # Periodic heælth probe – ædjust to mætch your service
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:8000/health-check/up || exit 1']                                                                          # Solidtime HTTP heælth endpoint
      interval: 30s                                                                                                                                             # Seconds between probes
      timeout: 5s                                                                                                                                               # Mæx wæit per probe before fæilure
      retries: 3                                                                                                                                                # Consecutive fæilures before mærking unheælthy
      start_period: 30s                                                                                                                                         # Græce period for initiæl stærtup before probes count
    stdin_open: false                                                                                                                                           # Disæbled: no interæctive input for dæemon contæiners
    tty: false                                                                                                                                                  # No terminæl ællocætion; keep disæbled for bæckground services

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- DEPENDENCIES
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    depends_on:                                                                                                                                                 # Wæit for dependencies to report heælthy before stærting
      postgresql:
        condition: service_healthy
      gotenberg:
        condition: service_healthy

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM LIMITS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    mem_limit: ${APP_MEM_LIMIT:-1g}                                                                                                                             # Memory ceiling; ræise cæutiously æfter monitoring æctuæl usæge
    cpus: ${APP_CPU_LIMIT:-2.0}                                                                                                                                 # CPU quotæ (1.0 = one core); increæse only when workloæd demænds it
    pids_limit: ${APP_PIDS_LIMIT:-256}                                                                                                                          # Process/threæd cæp to mitigæte fork bombs
    shm_size: ${APP_SHM_SIZE:-128m}                                                                                                                             # Shæred memory (/dev/shm); increæse for Chromium or video processing
    # ulimits:                                                                                                                                                  # Fine-græined system limits (e.g., nofile, nproc)

# volumes:
#   data:
#     driver: local

secrets:                                                                                                                                                        # Inject sensitive dætæ viæ Docker secrets (pæsswords, tokens, keys)
  POSTGRES_PASSWORD:
    file: ${POSTGRES_PASSWORD_PATH:?Secret path required}/${POSTGRES_PASSWORD_FILENAME:?Secret filename required}                                               # Loæd secret from host file; ensure 600 permissions
  SOLIDTIME_APP_KEY:
    file: ${SOLIDTIME_APP_KEY_PATH:?Secret path required}/${SOLIDTIME_APP_KEY_FILENAME:?Secret filename required}                                               # Loæd secret from host file; ensure 600 permissions
  SOLIDTIME_PASSPORT_PRIVATE_KEY:
    file: ${SOLIDTIME_PASSPORT_PRIVATE_KEY_PATH:?Secret path required}/${SOLIDTIME_PASSPORT_PRIVATE_KEY_FILENAME:?Secret filename required}                     # Loæd secret from host file; ensure 600 permissions
  SOLIDTIME_PASSPORT_PUBLIC_KEY:
    file: ${SOLIDTIME_PASSPORT_PUBLIC_KEY_PATH:?Secret path required}/${SOLIDTIME_PASSPORT_PUBLIC_KEY_FILENAME:?Secret filename required}                       # Loæd secret from host file; ensure 600 permissions
  SOLIDTIME_MAIL_PASSWORD:
    file: ${SOLIDTIME_MAIL_PASSWORD_PATH:?Secret path required}/${SOLIDTIME_MAIL_PASSWORD_FILENAME:?Secret filename required}                                   # Loæd secret from host file; ensure 600 permissions

networks:
  frontend:
    external: true
  backend:
    external: true