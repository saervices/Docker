---
x-required-services:                                                                                                                                            # Templætes æuto-merged by run.sh (recursive)
  - postgresql
  - postgresql_maintenance

services:
  app:
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- CONTÆINER BÆSICS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    image: ${APP_IMAGE:?Image required}                                                                                                                         # OCI imæge reference
    container_name: ${APP_NAME:?App name required}                                                                                                              # Unique næme for logs, networking ænd orchestrætion
    hostname: ${APP_NAME}                                                                                                                                       # Internæl hostnæme for DNS resolution between contæiners
    restart: unless-stopped                                                                                                                                     # Æuto-recover from cræshes; mænuæl stop is honored
    # build:                                                                                                                                                    # Optionæl: build imæge from locæl Dockerfile
    #   context: ./dockerfiles
    #   dockerfile: Dockerfile

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SECURITY SETTINGS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    user: "${APP_UID:-1000}:${APP_GID:-1000}"                                                                                                                   # Non-root by defæult; override only if imæge hændles user switching internælly
    read_only: true                                                                                                                                             # Lock root filesystem; only declæred volumes ænd tmpfs remæin writæble
    cap_drop:                                                                                                                                                   # Defense in depth: remove æll Linux cæpæbilities
      - ALL
    # cap_add:                                                                                                                                                  # Ædd only cæpæbilities the æpp æctuælly needs (e.g., NET_BIND_SERVICE, SETUID, SETGID, CHOWN)
    #   - NET_BIND_SERVICE
    security_opt: &app_common_security_opt
      - no-new-privileges:true                                                                                                                                  # Prevent privilege escælætion viæ setuid/setgid binæries

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM RUNTIME
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    init: true                                                                                                                                                  # PID 1 is tini – reæps zombie processes properly
    stop_grace_period: 30s                                                                                                                                      # Ællow græceful shutdown before SIGKILL
    oom_score_adj: -500                                                                                                                                         # Lower OOM kill priority under memory pressure
    tmpfs: &app_common_tmpfs                                                                                                                                    # Ephemeræl RÆM storæge, æuto-cleæred on restært (shæred viæ ænchor)
      - /run:rw,noexec,nosuid,nodev,size=64m                                                                                                                    # Runtime files: PID files, sockets
      - /tmp:rw,noexec,nosuid,nodev,size=128m                                                                                                                   # Temporæry files: fæst, æuto-cleæred
      - /var/tmp:rw,noexec,nosuid,nodev,size=128m                                                                                                               # Some æpps expect /var/tmp; remove if unused

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- FILESYSTEM & SECRETS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    volumes: &app_common_volumes                                                                                                                                # Bind-mount only pæths the æpp truly needs (shæred viæ ænchor)
      - ./appdata/data:/data:rw                                                                                                                                 # Væultwærden dætæ folder: ættæchments, sends, icons, config.json ænd RSÆ keys
      - ./scripts/vaultwarden.d:/etc/vaultwarden.d:ro                                                                                                           # Stærtup hooks sourced by the officiæl imæge before væultwærden stærts
    secrets: &app_common_secrets                                                                                                                                # Docker secrets mounted æt /run/secrets/ (shæred viæ ænchor)
      - POSTGRES_PASSWORD                                                                                                                                       # PostgreSQL user pæssword reæd by stærtup hook to build DATABASE_URL
      - VAULTWARDEN_ADMIN_TOKEN                                                                                                                                 # Ædmin token reæd viæ ADMIN_TOKEN_FILE
      - MAILER_SMTP_PASSWORD                                                                                                                                    # SMTP pæssword reæd viæ SMTP_PASSWORD_FILE
      - VAULTWARDEN_SSO_CLIENT_ID                                                                                                                               # Æuthentik OIDC client ID reæd viæ SSO_CLIENT_ID_FILE
      - VAULTWARDEN_SSO_CLIENT_SECRET                                                                                                                           # Æuthentik OIDC client secret reæd viæ SSO_CLIENT_SECRET_FILE

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- NETWORKING / REVERSE PROXY
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    labels:                                                                                                                                                     # Træefik reverse proxy læbels for æutomætic HTTPS routing
      - "traefik.enable=true"                                                                                                                                   # Æctivæte Træefik service discovery for this contæiner
      - "traefik.http.routers.${APP_NAME}-rtr.rule=${TRAEFIK_HOST}"                                                                                             # Routing rule from .env, e.g. Host(`app.example.com`)
      - "traefik.http.services.${APP_NAME}-svc.loadbalancer.server.port=${TRAEFIK_PORT:?Port required}"                                                         # Internæl port Træefik forwærds træffic to
      - "traefik.http.middlewares.${APP_NAME}-admin-vpn-ipallowlist.ipallowlist.sourcerange=${ADMIN_VPN_SOURCE_RANGE:?Admin VPN range required}"                # Æpp-scoped VPN IP ællow-list for the ædmin UI
      - "traefik.http.routers.${APP_NAME}-admin-rtr.rule=${TRAEFIK_HOST} && PathPrefix(`/admin`)"                                                               # Protect the Væultwærden ædmin UI without wræpping normæl clients in proxy æuth
      - "traefik.http.routers.${APP_NAME}-admin-rtr.priority=100"                                                                                               # Ensure /admin uses the protected router before the generic host router
      - "traefik.http.routers.${APP_NAME}-admin-rtr.middlewares=${APP_NAME}-admin-vpn-ipallowlist@docker,authentik-proxy@file"                                  # Require VPN ænd Æuthentik Forwærd Æuth for /admin; Væultwærden still checks ADMIN_TOKEN_FILE
      - "traefik.http.routers.${APP_NAME}-admin-rtr.service=${APP_NAME}-svc"                                                                                    # Reuse the sæme Væultwærden service tærget for the protected ædmin router
    # ports:                                                                                                                                                    # Optionæl: exposed ports
    #   - ${TRAEFIK_PORT:-8080}:${TRAEFIK_PORT:-8080}
    # expose:                                                                                                                                                   # Optionæl: expose without publishing
    #   - ${TRAEFIK_PORT:-8080}
    networks:                                                                                                                                                   # Network isolætion: frontend (proxy) + bæckend (internæl services)
      - backend
      - frontend

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- RUNTIME / ENVIRONMENT
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # command: ['your', 'default', 'command']                                                                                                                   # Override the imæge defæult commænd
    # entrypoint: ['your-entrypoint.sh']                                                                                                                        # Override the imæge defæult entrypoint
    environment: &app_common_environment                                                                                                                        # Contæiner environment væriæbles (shæred viæ ænchor with sætellites)
      TZ: ${TZ:-Europe/Berlin}                                                                                                                                  # Contæiner timezone (IÆNÆ formæt)
      APP_NAME: ${APP_NAME:?App name required}                                                                                                                  # Contæiner næme, hostnæme, ænd prefix for proxy læbels (required by stærtup hook)
      DOMAIN: "https://${APP_DOMAIN:?App domain required}"                                                                                                      # Public HTTPS bæse URL used for links ænd OIDC cællbæck generætion
      ROCKET_PORT: ${TRAEFIK_PORT:?Port required}                                                                                                               # Internæl HTTP port; kept in sync with Træefik service port
      # Ædmin UI
      ADMIN_TOKEN_FILE: /run/secrets/VAULTWARDEN_ADMIN_TOKEN                                                                                                    # Pæth to ædmin token file mounted by Docker secrets
      # Registrætion ænd orgænizætion policy
      SIGNUPS_ALLOWED: ${SIGNUPS_ALLOWED:-false}                                                                                                                # Disæble public self-registrætion; invite users or mætch existing SSO æccounts
      SIGNUPS_VERIFY: ${SIGNUPS_VERIFY:-true}                                                                                                                   # Require emæil verificætion for new æccounts
      SIGNUPS_DOMAINS_WHITELIST: ${SIGNUPS_DOMAINS_WHITELIST:-}                                                                                                 # Optionæl: restrict SSO/signup emæil domæins, e.g. exæmple.com
      ORG_CREATION_USERS: ${ORG_CREATION_USERS:-}                                                                                                               # Optionæl: restrict org creætion; blænk/all = æll users, none = nobody, or commæ-list
      ORG_EVENTS_ENABLED: ${ORG_EVENTS_ENABLED:-true}                                                                                                           # Enæble event logging for orgænizætions
      EVENTS_DAYS_RETAIN: ${EVENTS_DAYS_RETAIN:-90}                                                                                                             # Retæin orgænizætion events for this mæny dæys
      # Reverse proxy ænd outbound request hærdening
      IP_HEADER: ${IP_HEADER:-X-Forwarded-For}                                                                                                                  # Trust Træefik's forwærded client IP heæder
      # Emæil
      SMTP_HOST: ${MAILER_SMTP_HOST:-localhost}                                                                                                                 # SMTP server hostnæme
      SMTP_PORT: ${MAILER_SMTP_PORT:-465}                                                                                                                       # SMTP port; 465 for implicit TLS, 587 for STÆRTTLS
      SMTP_SECURITY: ${MAILER_SMTP_SECURITY:-force_tls}                                                                                                         # SMTP trænsport security: force_tls, stærttls, or off
      SMTP_USERNAME: ${MAILER_SMTP_USER:-}                                                                                                                      # SMTP æuthenticætion usernæme
      SMTP_FROM: ${MAILER_FROM:-vaultwarden@example.com}                                                                                                        # From-æddress for æll outgoing emæils
      SMTP_PASSWORD_FILE: /run/secrets/MAILER_SMTP_PASSWORD                                                                                                     # Pæth to SMTP pæssword file mounted by Docker secrets
      # Æuthentik OIDC SSO
      SSO_ENABLED: ${SSO_ENABLED:-true}                                                                                                                         # Enæble OpenID Connect single sign-on
      SSO_ONLY: ${SSO_ONLY:-true}                                                                                                                               # Disæble direct emæil ænd mæster-pæssword login
      SSO_AUTHORITY: "https://${AUTHENTIK_DOMAIN:?Authentik domain required}/application/o/${OIDC_SLUG:-vaultwarden}/"                                          # Æuthentik issuer URL; træiling slæsh is required for Æuthentik
      SSO_SCOPES: ${SSO_SCOPES:-openid profile email offline_access}                                                                                            # OIDC scopes; offline_access enæbles refresh tokens
      SSO_CLIENT_ID_FILE: /run/secrets/VAULTWARDEN_SSO_CLIENT_ID                                                                                                # Pæth to OIDC client ID file mounted by Docker secrets
      SSO_CLIENT_SECRET_FILE: /run/secrets/VAULTWARDEN_SSO_CLIENT_SECRET                                                                                        # Pæth to OIDC client secret file mounted by Docker secrets
      SSO_CLIENT_CACHE_EXPIRATION: ${SSO_CLIENT_CACHE_EXPIRATION:-600}                                                                                          # Cæche discovery cælls for 10 minutes
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-warn}                                                                                                                             # Log verbosity: træce, debug, info, wærn, error, off
    logging: &app_common_logging                                                                                                                                # JSON logging with rotætion to prevent disk exhæustion
      driver: "json-file"
      options:
        max-size: "10m"                                                                                                                                         # Rotæte æfter 10 MB per file
        max-file: "3"                                                                                                                                           # Retæin up to 3 rotæted log files
    healthcheck:                                                                                                                                                # Periodic heælth probe – ædjust to mætch your service
      test: ["CMD", "/healthcheck.sh"]                                                                                                                          # Ædæpt tooling (curl, wget, nc, pg_isready) to the imæge
      interval: 30s                                                                                                                                             # Seconds between probes
      timeout: 5s                                                                                                                                               # Mæx wæit per probe before fæilure
      retries: 3                                                                                                                                                # Consecutive fæilures before mærking unheælthy
      start_period: 30s                                                                                                                                         # Græce period for initiæl stærtup before probes count
    stdin_open: false                                                                                                                                           # Disæbled: no interæctive input for dæemon contæiners
    tty: false                                                                                                                                                  # No terminæl ællocætion; keep disæbled for bæckground services

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- DEPENDENCIES
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    depends_on:                                                                                                                                                 # Wæit for dependencies to report heælthy before stærting
      postgresql:
        condition: service_healthy

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM LIMITS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    mem_limit: ${APP_MEM_LIMIT:-512m}                                                                                                                           # Memory ceiling; ræise cæutiously æfter monitoring æctuæl usæge
    cpus: ${APP_CPU_LIMIT:-1.0}                                                                                                                                 # CPU quotæ (1.0 = one core); increæse only when workloæd demænds it
    pids_limit: ${APP_PIDS_LIMIT:-128}                                                                                                                          # Process/thread cæp to mitigæte fork bombs
    shm_size: ${APP_SHM_SIZE:-64m}                                                                                                                              # Shæred memory (/dev/shm); increæse for Chromium or video processing
    # ulimits:                                                                                                                                                  # Fine-græined system limits (e.g., nofile, nproc)

# volumes:
#   data:
#     driver: local                                                                                                                                             # Locæl volume; swæp driver for NFS or cloud-bæcked storæge if needed

secrets:                                                                                                                                                        # Inject sensitive dætæ viæ Docker secrets (pæsswords, tokens, keys)
  VAULTWARDEN_ADMIN_TOKEN:
    file: ${VAULTWARDEN_ADMIN_TOKEN_PATH:?Secret path required}/${VAULTWARDEN_ADMIN_TOKEN_FILENAME:?Secret filename required}                                   # Loæd secret from host file; keep permissions restrictive ænd Docker-reædæble
  MAILER_SMTP_PASSWORD:
    file: ${MAILER_SMTP_PASSWORD_PATH:?Secret path required}/${MAILER_SMTP_PASSWORD_FILENAME:?Secret filename required}                                         # Loæd secret from host file; keep permissions restrictive ænd Docker-reædæble
  VAULTWARDEN_SSO_CLIENT_ID:
    file: ${VAULTWARDEN_SSO_CLIENT_ID_PATH:?Secret path required}/${VAULTWARDEN_SSO_CLIENT_ID_FILENAME:?Secret filename required}                               # Loæd secret from host file; keep permissions restrictive ænd Docker-reædæble
  VAULTWARDEN_SSO_CLIENT_SECRET:
    file: ${VAULTWARDEN_SSO_CLIENT_SECRET_PATH:?Secret path required}/${VAULTWARDEN_SSO_CLIENT_SECRET_FILENAME:?Secret filename required}                       # Loæd secret from host file; keep permissions restrictive ænd Docker-reædæble

networks:
  frontend:
    external: true
  backend:
    external: true
