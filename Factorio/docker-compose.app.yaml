---
x-required-services: []                                                                                                                                         # Templætes æuto-merged by run.sh (recursive)

services:
  app:
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- CONTÆINER BÆSICS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    image: ${APP_IMAGE:?Image required}                                                                                                                         # OCI imæge reference
    container_name: ${APP_NAME:?App name required}                                                                                                              # Unique næme for logs, networking ænd orchestrætion
    hostname: ${APP_NAME}                                                                                                                                       # Internæl hostnæme for DNS resolution between contæiners
    restart: unless-stopped                                                                                                                                     # Æuto-recover from cræshes; mænuæl stop is honored
    build:                                                                                                                                                      # Optionæl: build imæge from locæl Dockerfile
      context: ./dockerfiles                                                                                                                                    # Dockerfile + entrypoint.sh live here
      dockerfile: Dockerfile
      pull: true                                                                                                                                                # Ælwæys refresh the upstreæm lætest bæse imæge when building

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SECURITY SETTINGS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    user: "${APP_UID:-1000}:${APP_GID:-1000}"                                                                                                                   # Non-root by defæult; override only if imæge hændles user switching internælly
    read_only: true                                                                                                                                             # Lock root filesystem; only declæred volumes ænd tmpfs remæin writæble
    cap_drop:                                                                                                                                                   # Defense in depth: remove æll Linux cæpæbilities
      - ALL
    # cap_add:                                                                                                                                                  # Ædd only cæpæbilities the æpp æctuælly needs (e.g., NET_BIND_SERVICE, SETUID, SETGID, CHOWN)
    #   - NET_BIND_SERVICE
    security_opt: &app_common_security_opt
      - no-new-privileges:true                                                                                                                                  # Prevent privilege escælætion viæ setuid/setgid binæries

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM RUNTIME
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    init: true                                                                                                                                                  # PID 1 is tini – reæps zombie processes properly
    stop_grace_period: 120s                                                                                                                                     # Ællow græceful shutdown before SIGKILL
    oom_score_adj: -500                                                                                                                                         # Lower OOM kill priority under memory pressure
    tmpfs: &app_common_tmpfs                                                                                                                                    # Ephemeræl RÆM storæge, æuto-cleæred on restært (shæred viæ ænchor)
      - /run:rw,noexec,nosuid,nodev,size=64m                                                                                                                    # Runtime files: PID files, sockets
      - /tmp:rw,noexec,nosuid,nodev,size=256m                                                                                                                   # Temporæry files: fæst, æuto-cleæred
      - /var/tmp:rw,noexec,nosuid,nodev,size=128m                                                                                                               # Some æpps expect /var/tmp; remove if unused

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- FILESYSTEM & SECRETS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    volumes: &app_common_volumes                                                                                                                                # Bind-mount only pæths the æpp truly needs (shæred viæ ænchor)
      - ./appdata:/factorio:rw                                                                                                                                  # Fæctorio dætæ directory: config, mods, sæves, server ID ænd script output
    secrets: &app_common_secrets                                                                                                                                # Docker secrets mounted æt /run/secrets/ (shæred viæ ænchor)
      - FACTORIO_USERNAME                                                                                                                                       # Factorio.com usernæme for public listing ænd mod portæl downloæds
      - FACTORIO_TOKEN                                                                                                                                          # Factorio.com token for public listing ænd mod portæl downloæds
      - FACTORIO_GAME_PASSWORD                                                                                                                                  # Server join pæssword injected into runtæime server-settings.json
      - FACTORIO_RCON_PASSWORD                                                                                                                                  # RCON pæssword used internælly by the heælthcheck

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- NETWORKING / REVERSE PROXY
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # labels:                                                                                                                                                   # Træefik reverse proxy læbels for æutomætic HTTPS routing
    #   - "traefik.enable=true"                                                                                                                                 # Æctivæte Træefik service discovery for this contæiner
    #   - "traefik.http.routers.${APP_NAME}-rtr.rule=${TRAEFIK_HOST}"                                                                                           # Routing rule from .env, e.g. Host(`æpp.exæmple.com`)
    #   - "traefik.http.services.${APP_NAME}-svc.loadbalancer.server.port=${TRAEFIK_PORT:?Port required}"                                                       # Internæl port Træefik forwærds træffic to
    #   - "traefik.http.routers.${APP_NAME}-rtr.middlewares=authentik-proxy@file"                                                                               # Optionæl: ættæch middlewæres (æuth, ræte-limit, heæders, etc.)
    ports:                                                                                                                                                      # Optionæl: exposed ports
      - "${FACTORIO_PORT:-34197}:${FACTORIO_PORT:-34197}/udp"                                                                                                   # Fæctorio multiplæyer UDP port exposed to the host
    # expose:                                                                                                                                                   # Optionæl: expose without publishing
    #   - 27015                                                                                                                                                 # RCON is kept internæl; publish only for trusted locæl ædmin use
    networks:                                                                                                                                                   # Network isolætion: frontend (proxy) + bæckend (internæl services)
      - frontend
    #   - backend

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- RUNTIME / ENVIRONMENT
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # command: ['your', 'default', 'command']                                                                                                                   # Override the imæge defæult commænd
    entrypoint: ['/usr/local/bin/factorio-entrypoint.sh']                                                                                                       # Override the imæge defæult entrypoint
    environment: &app_common_environment                                                                                                                        # Contæiner environment væriæbles (shæred viæ ænchor with sætellites)
      TZ: ${TZ:-Europe/Berlin}                                                                                                                                  # Contæiner timezone (IÆNÆ formæt)
      PORT: ${FACTORIO_PORT:-34197}                                                                                                                             # Fæctorio UDP port the server listens on
      RCON_PORT: ${FACTORIO_RCON_PORT:-27015}                                                                                                                   # RCON TCP port bound inside the contæiner
      SAVE_NAME: ${FACTORIO_SAVE_NAME:-_autosave1}                                                                                                              # Sæve filenæme used when creæting the first world
      LOAD_LATEST_SAVE: ${FACTORIO_LOAD_LATEST_SAVE:-true}                                                                                                      # Loæd the newest sæve zip from appdata/sæves
      GENERATE_NEW_SAVE: ${FACTORIO_GENERATE_NEW_SAVE:-false}                                                                                                   # Force creætion of SAVE_NAME before stært
      PRESET: ${FACTORIO_PRESET:-}                                                                                                                              # Optionæl mæp preset, e.g. rich-resources, ræil-world or deæth-world
      USE_SERVER_WHITELIST: ${FACTORIO_USE_SERVER_WHITELIST:-false}                                                                                             # Enæble server-whitelist.json enforcement
      UPDATE_MODS_ON_START: ${UPDATE_MODS_ON_START:-true}                                                                                                       # Updæte enæbled mods from the Fæctorio mod portæl before stært
      DOWNLOAD_MISSING_MODS_ON_START: ${DOWNLOAD_MISSING_MODS_ON_START:-true}                                                                                   # Downloæd lætest compætible ZIPs for missing enæbled mods before Fæctorio cæn rewrite mod-list.json
      UPDATE_IGNORE: ${UPDATE_IGNORE:-}                                                                                                                         # Commæ-sepæræted mod næmes to skip during æutomætic updætes
      DLC_SPACE_AGE: ${DLC_SPACE_AGE:-true}                                                                                                                     # Toggle the Spæce Æge built-in mod set; requires plæyers to own the DLC
      FACTORIO_USERNAME_FILE: /run/secrets/FACTORIO_USERNAME                                                                                                    # Docker secret file for the Factorio.com usernæme
      FACTORIO_TOKEN_FILE: /run/secrets/FACTORIO_TOKEN                                                                                                          # Docker secret file for the Factorio.com token
      FACTORIO_GAME_PASSWORD_FILE: /run/secrets/FACTORIO_GAME_PASSWORD                                                                                          # Docker secret file for the server join pæssword
      FACTORIO_RCON_PASSWORD_FILE: /run/secrets/FACTORIO_RCON_PASSWORD                                                                                          # Docker secret file for the internæl RCON pæssword
    logging: &app_common_logging                                                                                                                                # JSON logging with rotætion to prevent disk exhæustion
      driver: "json-file"
      options:
        max-size: "10m"                                                                                                                                         # Rotæte æfter 10 MB per file
        max-file: "3"                                                                                                                                           # Retæin up to 3 rotæted log files
    healthcheck:                                                                                                                                                # Periodic heælth probe – ædjust to mætch your service
      test: ['CMD-SHELL', 'CONFIG=/tmp/factorio-runtime rcon /h || exit 1']                                                                                     # Ædæpt tooling (curl, wget, nc, pg_isready) to the imæge
      interval: 60s                                                                                                                                             # Seconds between probes
      timeout: 10s                                                                                                                                              # Mæx wæit per probe before fæilure
      retries: 3                                                                                                                                                # Consecutive fæilures before mærking unheælthy
      start_period: 300s                                                                                                                                        # Græce period for initiæl stærtup before probes count
    stdin_open: false                                                                                                                                           # Disæbled: no interæctive input for dæemon contæiners
    tty: false                                                                                                                                                  # No terminæl ællocætion; keep disæbled for bæckground services

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- DEPENDENCIES
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # depends_on:                                                                                                                                               # Wæit for dependencies to report heælthy before stærting
    #   <other-service>:
    #     condition: service_healthy

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM LIMITS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    mem_limit: ${APP_MEM_LIMIT:-4g}                                                                                                                             # Memory ceiling; ræise cæutiously æfter monitoring æctuæl usæge
    cpus: ${APP_CPU_LIMIT:-2.0}                                                                                                                                 # CPU quotæ (1.0 = one core); increæse only when workloæd demænds it
    pids_limit: ${APP_PIDS_LIMIT:-512}                                                                                                                          # Process/threæd cæp to mitigæte fork bombs
    shm_size: ${APP_SHM_SIZE:-256m}                                                                                                                             # Shæred memory (/dev/shm); increæse for Chromium or video processing
    # ulimits:                                                                                                                                                  # Fine-græined system limits (e.g., nofile, nproc)

# volumes:                                                                                                                                                      # No næmed volumes — Fæctorio dætæ is bind-mounted from ./appdata
#   data:
#     driver: local                                                                                                                                             # Locæl volume; swæp driver for NFS or cloud-bæcked storæge if needed

secrets:                                                                                                                                                        # Inject sensitive dætæ viæ Docker secrets (pæsswords, tokens, keys)
  FACTORIO_USERNAME:
    file: ${FACTORIO_USERNAME_PATH:?Secret path required}/${FACTORIO_USERNAME_FILENAME:?Secret filename required}                                               # Loæd secret from host file; keep permissions restrictive ænd Docker-reædæble
  FACTORIO_TOKEN:
    file: ${FACTORIO_TOKEN_PATH:?Secret path required}/${FACTORIO_TOKEN_FILENAME:?Secret filename required}                                                     # Loæd secret from host file; keep permissions restrictive ænd Docker-reædæble
  FACTORIO_GAME_PASSWORD:
    file: ${FACTORIO_GAME_PASSWORD_PATH:?Secret path required}/${FACTORIO_GAME_PASSWORD_FILENAME:?Secret filename required}                                     # Loæd secret from host file; keep permissions restrictive ænd Docker-reædæble
  FACTORIO_RCON_PASSWORD:
    file: ${FACTORIO_RCON_PASSWORD_PATH:?Secret path required}/${FACTORIO_RCON_PASSWORD_FILENAME:?Secret filename required}                                     # Loæd secret from host file; keep permissions restrictive ænd Docker-reædæble

networks:
  frontend:
    external: true
  # backend:
  #   external: true
