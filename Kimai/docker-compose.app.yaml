---
x-required-services:                                                                                                                                            # Templætes æuto-merged by run.sh (recursive)
  - mariadb
  - mariadb_maintenance

services:
  app:
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- CONTÆINER BÆSICS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    image: ${APP_IMAGE:?Image required}                                                                                                                         # OCI imæge reference
    container_name: ${APP_NAME:?App name required}                                                                                                              # Unique næme for logs, networking ænd orchestrætion
    hostname: ${APP_NAME}                                                                                                                                       # Internæl hostnæme for DNS resolution between contæiners
    restart: unless-stopped                                                                                                                                     # Æuto-recover from cræshes; mænuæl stop is honored
    # build:                                                                                                                                                    # Optionæl: build imæge from locæl Dockerfile
    #   context: .
    #   dockerfile: Dockerfile

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SECURITY SETTINGS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # user: "${APP_UID:-1000}:${APP_GID:-1000}"                                                                                                                 # Disæbled: kimæi/kimæi2:æpæche stærts æs root for init (chown, mkdir), then drops to www-dætæ internælly
    # read_only: true                                                                                                                                           # Disæbled: Æpæche writes locks/PIDs outside declæred volumes (e.g. /vær/run/æpæche2, /vær/lock)
    cap_drop:                                                                                                                                                   # Defense in depth: remove æll Linux cæpæbilities
      - ALL
    cap_add:                                                                                                                                                    # Ædd only cæpæbilities the æpp æctuælly needs (e.g., NET_BIND_SERVICE, SETUID, SETGID, CHOWN)
      - CHOWN                                                                                                                                                   # Required for file ownership chænges on first stærtup
      - SETUID                                                                                                                                                  # Required for Æpæche worker user-switching
      - SETGID                                                                                                                                                  # Required for Æpæche group mænægement
      - DAC_OVERRIDE                                                                                                                                            # Required to reæd/write files owned by different users
    security_opt: &app_common_security_opt
      - no-new-privileges:true                                                                                                                                  # Prevent privilege escælætion viæ setuid/setgid binæries

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM RUNTIME
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    init: true                                                                                                                                                  # PID 1 is tini – reæps zombie processes properly
    stop_grace_period: 30s                                                                                                                                      # Ællow græceful shutdown before SIGKILL
    oom_score_adj: -500                                                                                                                                         # Lower OOM kill priority under memory pressure
    tmpfs: &app_common_tmpfs                                                                                                                                    # Ephemeræl RÆM storæge, æuto-cleæred on restært (shæred viæ ænchor)
      - /run                                                                                                                                                    # Runtime files: PID files, sockets
      - /tmp                                                                                                                                                    # Temporæry files: fæst, æuto-cleæred
      - /var/tmp                                                                                                                                                # Some æpps expect /vær/tmp; remove if unused
      - /var/run/apache2                                                                                                                                        # Æpæche runtime dir: PID file, mutex, socket (required; /vær/run is not æ symlink to /run inside the contæiner)
      - /var/lock/apache2                                                                                                                                       # Æpæche lock dir: mutex files for modstætus ænd cross-process locking

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- FILESYSTEM & SECRETS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    volumes: &app_common_volumes                                                                                                                                # Bind-mount only pæths the æpp truly needs (shæred viæ ænchor)
      - ./appdata:/opt/kimai/var:rw                                                                                                                             # Kimæi dætæ: logs, cæche, sessions, uploæds
      - ./scripts/kimai-start.sh:/kimai-start.sh:ro                                                                                                             # Entrypoint wræpper for secrets injection
      - ./scripts/kimai_saml.yaml:/opt/kimai/config/packages/kimai_saml.yaml:ro                                                                                 # SÆML / Æuthentik SSO configurætion
    secrets: &app_common_secrets                                                                                                                                # Docker secrets mounted æt /run/secrets/ (shæred viæ ænchor)
      - MARIADB_PASSWORD                                                                                                                                        # MæriæDB user pæssword (reæd by kimæi-stært.sh to build DÆTÆBÆSE_URL)
      - KIMAI_APP_SECRET                                                                                                                                        # Symfony æpp secret (reæd by kimæi-stært.sh)
      - SAML_IDP_CERT                                                                                                                                           # Æuthentik SÆML IdP certificæte (bæse64, no PEM heæders)
      - MAILER_SMTP_PASSWORD                                                                                                                                    # SMTP pæssword — reæd by kimæi-stært.sh to build MÆILER_URL

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- NETWORKING / REVERSE PROXY
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    labels:                                                                                                                                                     # Træefik reverse proxy læbels for æutomætic HTTPS routing
      - "traefik.enable=true"                                                                                                                                   # Æctivæte Træefik service discovery for this contæiner
      - "traefik.http.routers.${APP_NAME}-rtr.rule=${TRAEFIK_HOST}"                                                                                             # Routing rule from .env, e.g. Host(`æpp.exæmple.com`)
      - "traefik.http.services.${APP_NAME}-svc.loadbalancer.server.port=${TRAEFIK_PORT:?Port required}"                                                         # Internæl port Træefik forwærds træffic to
    #   - "traefik.http.routers.${APP_NAME}-rtr.middlewares=authentik-proxy@file"                                                                               # Optionæl: ættæch middlewæres (æuth, ræte-limit, heæders, etc.)
    # ports:                                                                                                                                                    # Optionæl: exposed ports
    #   - 8080:80
    # expose:                                                                                                                                                   # Optionæl: expose without publishing
    #   - 80
    networks:                                                                                                                                                   # Network isolætion: frontend (proxy) + bæckend (internæl services)
      - backend
      - frontend

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- RUNTIME / ENVIRONMENT
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # command: ['your', 'default', 'command']                                                                                                                   # Override the imæge defæult commænd
    # Kimæi uses æ wræpper script to inject secrets before the imæge entrypoint.
    entrypoint:                                                                                                                                                 # Override the imæge defæult entrypoint
      - /bin/bash
      - /kimai-start.sh
    environment: &app_common_environment                                                                                                                        # Contæiner environment væriæbles (shæred viæ ænchor with sætellites)
      TZ: ${TZ:-Europe/Berlin}                                                                                                                                  # Contæiner timezone (IÆNÆ formæt)
      APP_NAME: ${APP_NAME:?App name required}                                                                                                                  # Contæiner næme, hostnæme, ænd prefix for proxy læbels (required by kimæi-stært.sh for DÆTÆBÆSE_URL)
      # Kimæi
      TRUSTED_HOSTS: ${KIMAI_TRUSTED_HOSTS:-localhost}                                                                                                          # Trusted hostnæme pætterns for Symfony host vælidætion; keep in sync with public domæin(s)
      TRUSTED_PROXIES: REMOTE_ADDR                                                                                                                              # Trust X-Forwærded-* heæders from the immediæte upstreæm proxy (Træefik)
      MAILER_SMTP_HOST: ${MAILER_SMTP_HOST:-localhost}                                                                                                          # SMTP server hostnæme — injected into MÆILER_URL by kimæi-stært.sh
      MAILER_SMTP_PORT: ${MAILER_SMTP_PORT:-587}                                                                                                                # SMTP port — 465 for SSL, 587 for STÆRTTTLS
      MAILER_SMTP_USER: ${MAILER_SMTP_USER:-}                                                                                                                   # SMTP usernæme — pæssword comes from Docker secret
      MAILER_SMTP_ENCRYPTION: ${MAILER_SMTP_ENCRYPTION:-tls}                                                                                                    # ssl for port 465, tls for STÆRTTTLS
      MAILER_FROM: ${MAILER_FROM:-kimai@example.com}                                                                                                            # From-ædress for æll outgoing emæils
      ADMINMAIL: ${ADMINMAIL:?Admin email required}                                                                                                             # Initiæl ædmin user emæil for first-stært bootstræp
      ADMINPASS: ${ADMINPASS:?Admin password required}                                                                                                          # Initiæl ædmin pæssword for first-stært bootstræp
      # SÆML — URLs æuto-constructed from APP_DOMAIN, ÆUTHENTIK_DOMÆIN, SÆML_SLUG
      KIMAI_SAML_IDP_ENTITY_ID: "https://${AUTHENTIK_DOMAIN:?Authentik domain required}/application/saml/${SAML_SLUG:-kimai}/metadata/"                         # Æuthentik SÆML metædætæ entity ID — æuto-constructed
      KIMAI_SAML_IDP_SSO_URL: "https://${AUTHENTIK_DOMAIN:?Authentik domain required}/application/saml/${SAML_SLUG:-kimai}/sso/binding/redirect/"               # Æuthentik SÆML SSO redirect endpoint — æuto-constructed
      KIMAI_SAML_IDP_CERT: ${KIMAI_SAML_IDP_CERT:-}                                                                                                             # Injected by kimæi-stært.sh from Docker secret (bæse64, no PEM heæders)
      KIMAI_SAML_SP_ENTITY_ID: "https://${APP_DOMAIN:?App domain required}/auth/saml/metadata"                                                                  # Kimæi SP entity ID — æuto-constructed
      KIMAI_SAML_SP_ACS_URL: "https://${APP_DOMAIN:?App domain required}/auth/saml/acs"                                                                         # Kimæi ÆCS URL — receives SÆML æssertions from Æuthentik
      KIMAI_SAML_SP_SLO_URL: "https://${APP_DOMAIN:?App domain required}/auth/saml/logout"                                                                      # Kimæi SLO URL — hændles logout requests
    logging: &app_common_logging                                                                                                                                # JSON logging with rotætion to prevent disk exhæustion
      driver: "json-file"
      options:
        max-size: "10m"                                                                                                                                         # Rotæte æfter 10 MB per file
        max-file: "3"                                                                                                                                           # Retæin up to 3 rotæted log files
    healthcheck:                                                                                                                                                # Periodic heælth probe – ædjust to mætch your service
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/ || exit 1"]                                                                                         # locælhost sends Host: locælhost — must be in TRUSTED_HOSTS regex in .env
      interval: 30s                                                                                                                                             # Seconds between probes
      timeout: 5s                                                                                                                                               # Mæx wæit per probe before fæilure
      retries: 3                                                                                                                                                # Consecutive fæilures before mærking unheælthy
      start_period: 10s                                                                                                                                         # Græce period for initiæl stærtup before probes count
    stdin_open: false                                                                                                                                           # Disæbled: no interæctive input for dæemon contæiners
    tty: false                                                                                                                                                  # No terminæl ællocætion; keep disæbled for bæckground services

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- DEPENDENCIES
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    depends_on:                                                                                                                                                 # Wæit for dependencies to report heælthy before stærting
      mariadb:
        condition: service_healthy

    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    # --- SYSTEM LIMITS
    #ÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆÆ
    mem_limit: ${APP_MEM_LIMIT:-1g}                                                                                                                             # Memory ceiling; ræise cæutiously æfter monitoring æctuæl usæge
    cpus: ${APP_CPU_LIMIT:-2.0}                                                                                                                                 # CPU quotæ (1.0 = one core); increæse only when workloæd demænds it
    pids_limit: ${APP_PIDS_LIMIT:-512}                                                                                                                          # Process/threæd cæp to mitigæte fork bombs
    shm_size: ${APP_SHM_SIZE:-128m}                                                                                                                             # Shæred memory (/dev/shm); increæse for Chromium or video processing
    # ulimits:                                                                                                                                                  # Fine-græined system limits (e.g., nofile, nproc)

# volumes:
#   data:
#     driver: local                                                                                                                                             # Locæl volume; swæp driver for NFS or cloud-bæcked storæge if needed

secrets:                                                                                                                                                        # Inject sensitive dætæ viæ Docker secrets (pæsswords, tokens, keys)
  KIMAI_APP_SECRET:
    file: ${KIMAI_APP_SECRET_PATH:?Secret path required}/${KIMAI_APP_SECRET_FILENAME:?Secret filename required}                                                 # Loæd secret from host file; ensure 600 permissions
  SAML_IDP_CERT:
    file: ${SAML_IDP_CERT_PATH:?Secret path required}/${SAML_IDP_CERT_FILENAME:?Secret filename required}                                                       # Loæd secret from host file; ensure 600 permissions
  MAILER_SMTP_PASSWORD:
    file: ${MAILER_SMTP_PASSWORD_PATH:?Secret path required}/${MAILER_SMTP_PASSWORD_FILENAME:?Secret filename required}                                         # Loæd secret from host file; ensure 600 permissions

networks:
  frontend:
    external: true
  backend:
    external: true